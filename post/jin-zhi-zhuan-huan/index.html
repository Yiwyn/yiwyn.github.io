              <p><font size= 5>二进制转八进制</font><br>
2^3 = 8<br>
-&gt; <strong>三个二进制位代表一个八进制位</strong></p>
<p>例如: 1111.1</p>
<ol>
<li>001 111.100</li>
<li>1    7   .   4</li>
<li>八进制为17.4</li>
</ol>
<p><font size= 5>二进制转十六进制</font><br>
2^4 = 16<br>
-&gt;<strong>四个二进制位表示一个十六进制位</strong></p>
<p>例如11111.1</p>
<ol>
<li>0001 1111.1000</li>
<li>1    f(15)   .   8</li>
<li>十六进制为 1f.8</li>
</ol>
